# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'



tasks:
  setup:
    vars:
        GITHUB: '{{.GITHUB | default "false"}}'
    desc: Setup the project
    cmds:
      - uvx cookiecutter -f gh:gael-close/quarto-tech-memo --no-input directory='manuscript' filename='manuscript'
      - uv sync --extra dev
      - uv run pytest -s
      - task consistent-title
    dir: paper
  
  
  render-all:
    desc: Render all supplementary materials and the paper
    cmds:
    - |
      task notebook NB=01-notebook.ipynb HTML=true
      task notebook NB=02-notebook.py HTML=true
      task render
      task dist
      echo ""
      echo "Running consistency checks..."
    dir: paper


  view:
    desc: View all generated files (paper PDF and supplementary HTML)
    cmds: 
      - open dist/*.pdf
      - open dist/supplementary/01-notebook.html
      - open dist/supplementary/02-notebook.html
    dir: paper
  
  save-example:
    desc: Distribute the landing page as an example (with Quarto site sidebar)
    cmds:
      - |
        rm -rf dist && mkdir dist && cp -R paper/dist/* dist/
        cd dist
        magick -density 150 *.pdf -quality 90 -background white -alpha remove thumbnail.png 2>/dev/null && echo "✓ Thumbnail: thumbnail.png" || echo "⚠ Thumbnail generation skipped"
        PROJECT_DIR="$(cd ../new-dir && pwd)" SCREENSHOT_WIDTH=1280 SCREENSHOT_HEIGHT=900 SCREENSHOT_WAIT=3000 chrome-screenshot.sh "$(pwd)/index.html" index.png && echo "✓ Screenshot: index.png" || echo "⚠ Screenshot failed"
      - cmd: ./check.sh
       
  
  test-all:
    desc: Run all tests from scratch
    cmds:
    - task: setup
    - task: basic-test
    - task: render
    - task: view
  