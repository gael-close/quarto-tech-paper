version: '3'

vars:
  FID: '<long ID string for the google file>'
  PUBNAME: 'Manuscript Published Filename'
  NOTEBOOK: ''
  HTML: 'false'

tasks:
  install:
    desc: "Install the project dependencies"
    cmds:
      - uv tool install quarto-cli
      - uv tool install quarto-tech-memo

  render:
    desc: "Rendering the paper"
    vars:
      TO: 'memo2'
    cmds:
      - cd manuscript && quarto-tech-memo manuscript.md --to {{.TO}}

  notebook:
    desc: "Execute and optionally convert a supplementary notebook to HTML"
    cmds:
      - |
        NB="{{.NOTEBOOK}}"
        HTML="{{.HTML}}"
        
        if [ -z "$NB" ]; then
          echo "Error: NOTEBOOK variable is required. Example: task notebook NOTEBOOK=01-notebook.ipynb HTML=true"
          exit 1
        fi
        
        STEM="${NB%.*}"
        EXT="${NB##*.}"
        
        if [ "$HTML" = "true" ]; then
          echo "Executing and converting notebook $NB to HTML"
        else
          echo "Executing notebook $NB"
        fi
        
        if [ "$EXT" = "ipynb" ]; then
          uv run jupyter nbconvert --to notebook --inplace --execute "notebooks/$NB"
        elif [ "$EXT" = "py" ] && [ "$HTML" != "true" ]; then
          uv run python "notebooks/$NB"
        fi
        
        if [ "$HTML" = "true" ]; then
          mkdir -p supplementary
          if [ "$EXT" = "ipynb" ]; then
            quarto render "notebooks/$NB" --self-contained --toc
            mv "notebooks/${STEM}.html" "supplementary/${STEM}.html"
          elif [ "$EXT" = "py" ]; then
            uv run marimo export html "notebooks/$NB" -o "supplementary/${STEM}.html"
          fi
        fi

  notebook-marimo:
    desc: "Start the marimo notebook editor"
    cmds:
      - uv run marimo edit notebooks/{{.NOTEBOOK}}

  make-toc:
    desc: "Generate contents.html table of contents"
    cmds:
      - tree -H '' -T "My Project" -l -L 5 -o contents.html && sed -i '' 's|<a href="./supplementary/">supplementary</a>|supplementary|g' contents.html
    dir: dist

  dist:
    desc: "Make the project landing page for distribution"
    cmds:
      - (cd ..; quarto render site)
      - ln -fs ../site/_build/index.html .
      - ln -fs ../manuscript/manuscript.pdf .
      - ln -fs ../supplementary .
      - task: make-toc
    dir: dist

  pub-gdrive:
    desc: "Publish the paper to Google Drive"
    cmds:
      - gdrive files update {{.FID}} manuscript.pdf
      - gdrive files rename {{.FID}} {{.PUBNAME}}.pdf
    dir: manuscript


