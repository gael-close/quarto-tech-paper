version: '3'

# Load the .env file globally
dotenv: ['.env']


tasks:
  install:
    desc: "Install the project dependencies"
    cmds:
      - uv tool install quarto-cli
      - uv tool install quarto-tech-memo

  render:
    desc: "Rendering the paper"
    vars:
      TO: 'memo2'
    cmds:
      - cd manuscript && quarto-tech-memo manuscript.md --to {{.TO}}
      - mv manuscript/manuscript.pdf dist/"$MANUSCRIPT.pdf"

  notebook:
    desc: "Execute and optionally convert a supplementary notebook to HTML"
    cmds:
      - |
        NB="{{.NB}}"
        HTML='{{.HTML | default "false"}}'
        
        if [ -z "$NB" ]; then
          echo "Error: NB variable is required. Example: task notebook NB=01-notebook.ipynb HTML=true"
          exit 1
        fi
        
        STEM="${NB%.*}"
        EXT="${NB##*.}"
        
        if [ "$HTML" = "true" ]; then
          echo "Executing and converting notebook $NB to HTML"
        else
          echo "Executing notebook $NB"
        fi
        
        if [ "$EXT" = "ipynb" ]; then
          uv run jupyter nbconvert --to notebook --inplace --execute "notebooks/$NB"
        elif [ "$EXT" = "py" ] && [ "$HTML" != "true" ]; then
          uv run python "notebooks/$NB"
        fi
        
        
        if [ "$HTML" = "true" ]; then
          mkdir -p dist/supplementary
          if [ "$EXT" = "ipynb" ]; then
            quarto render "notebooks/$NB" --self-contained --toc
            mv "notebooks/${STEM}.html" "dist/supplementary/${STEM}.html"
          elif [ "$EXT" = "py" ]; then
            uv run marimo export html "notebooks/$NB" -o "dist/supplementary/${STEM}.html"
          fi
        fi

  notebook-marimo:
    desc: "Start the marimo notebook editor"
    cmds:
      - uv run marimo edit notebooks/{{.NB}}

  make-toc:
    desc: "Generate contents.html table of contents"
    cmds:
      - tree -H '' -T "My Project" -l -L 5 -o contents.html && sed -i '' 's|<a href="./supplementary/">supplementary</a>|supplementary|g; s|href="./../supplementary/|href="./|g' contents.html
    dir: dist

  dist:
    desc: "Make the project landing page for distribution"
    cmds:
      - quarto render site
      - mv -f site/_build/index.html dist/index.html
      - sd "manuscript.pdf" "$MANUSCRIPT.pdf" dist/index.html 
      - rm -fr site/_build
      - task: make-toc

  pub-gdrive:
    desc: "Publish the paper to Google Drive"
    cmds:
      - gdrive files update $GOOGLE_FID "$MANUSCRIPT.pdf"
    dir: dist


