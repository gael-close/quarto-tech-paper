version: '3'

# Load the .env file globally
dotenv: ['.env']


tasks:
  install:
    desc: "Install the project dependencies"
    cmds:
      - uv tool install quarto-cli
      - uv tool install quarto-tech-memo

  render:
    desc: "Rendering the paper"
    cmds:
      - quarto-tech-memo manuscript.md --to memo2
      - mv manuscript.pdf ../dist/"$SHORT_TITLE.pdf"
    dir: manuscript


  notebook:
    desc: "Execute and convert Jupyter notebook to HTML (usage: task notebook -- 01-notebook.ipynb)"
    cmds:
      - |
        NB="{{.CLI_ARGS}}"
        STEM="${NB%.*}"
        echo "Executing and converting notebook $NB to HTML"
        uv run jupyter nbconvert --to notebook --inplace --execute "notebooks/$NB"
        mkdir -p dist/supplementary
        quarto render "notebooks/$NB" --self-contained --toc
        mv "notebooks/${STEM}.html" "dist/supplementary/${STEM}.html"

  notebook-marimo:
    desc: "Execute and convert marimo notebook to HTML (usage: task notebook-marimo -- 02-notebook.py)"
    cmds:
      - |
        NB="{{.CLI_ARGS}}"
        STEM="${NB%.*}"
        echo "Executing and converting marimo notebook $NB to HTML"
        mkdir -p dist/supplementary
        uv run marimo export html "notebooks/$NB" -o "dist/supplementary/${STEM}.html"

  make-toc:
    desc: "Generate contents.html table of contents"
    cmds:
      - tree -H '' -T "My Project" -l -L 5 -o contents.html && sed -i '' 's|<a href="./supplementary/">supplementary</a>|supplementary|g; s|href="./../supplementary/|href="./|g' contents.html
    dir: dist

  dist:
    desc: "Make the project landing page for distribution"
    cmds:
      - quarto render site
      - mv -f site/_build/index.html dist/index.html
      - sd "manuscript.pdf" "$SHORT_TITLE.pdf" dist/index.html 
      - rm -fr site/_build
      - task: make-toc

  pub-gdrive:
    desc: "Publish the paper to Google Drive"
    cmds:
      - uv run python ../scripts/upload-to-gdrive.py "$SHORT_TITLE.pdf" $GOOGLE_FID
    dir: dist

  consistent-title:
    desc: Replace template titles with SHORT_TITLE environment variable
    cmds:
      - |-
        sd '^title:.*' "title: $SHORT_TITLE" manuscript/manuscript.md
        sd '^title:.*' "title: $SHORT_TITLE" site/index.qmd


